global:
  storageClass: longhorn
  imagePullSecrets:
    - regcred

product:
  name: "Alquimia Slight"
  suite: "Alquimia Vision"
  targetPlatform: "appliance"
  os: "RHEL 10 AI"

serviceAccount:
  create: true
  name: ""

engine:
  enabled: true
  replicaCount: 1
  image:
    repository: alquimiaai/argos-engine
    tag: v0.10.3-beta.0
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  config:
    host: "0.0.0.0"
    port: "8000"
    logLevel: "debug"
    bffBaseUrl: ""
    natsUrl: ""
    frameBufferSize: "5"
    frameBatchSize: "1"
    storiesBufferSize: "5"
    storiesBatchSize: "2"
    media:
      playbackBaseUrl: ""
      internalReaderToken: "change-me"
    evidence:
      preSeconds: "3"
      postSeconds: "3"
      retentionSeconds: "30"
      finalizeDelaySeconds: "3.25"
  resources:
    requests:
      cpu: 2
      memory: 2Gi
    limits:
      cpu: 3
      memory: 3Gi

bff:
  enabled: true
  replicaCount: 1
  image:
    repository: alquimiaai/argos-bff
    tag: bff-v0.14.0-beta.0
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8000
    nodePort: 32000
  config:
    host: "0.0.0.0"
    port: "8000"
    authDisabled: "true"
    storageBucket: "argos-evidence"
    natsUrl: ""
    engineBaseUrl: ""
    accessTokenTtlMinutes: ""
    refreshTokenTtlDays: ""
    mediaGateway:
      apiBaseUrl: ""
      engineRtspBaseUrl: ""
      publicWebrtcBaseUrl: ""
    virtualCameras:
      enabled: "true"
      storageBucket: "argos-virtual-cameras"
      storagePrefix: ""
      rtspBaseUrl: ""
      frameInterval: "1.0"
      profileName: "Oficina"
      cacheDir: "/tmp/argos-virtual-cameras"
  secret:
    jwtSecret: "change-me"
    bootstrapAdminUsername: "adminBff"
    bootstrapAdminPassword: "change-me"
    mediamtxInternalReaderToken: "change-me"
    virtualCameraPublishToken: ""
  resources:
    requests:
      cpu: 2
      memory: 3Gi
    limits:
      cpu: 3
      memory: 4Gi

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  auth:
    database: bffdb
    username: bffUser
    password: change-me
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  service:
    port: 5432
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

minio:
  enabled: true
  image:
    repository: quay.io/minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  rootUser: "change-me"
  rootPassword: "change-me"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  service:
    type: NodePort
    apiPort: 9000
    consolePort: 9001
    nodePortApi: 30900
    nodePortConsole: 30901
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

vlm:
  enabled: true
  replicaCount: 1
  runtimeClassName: nvidia
  image:
    repository: vllm/vllm-openai
    digest: "sha256:2296a2a7e1ce1dc59c6577ba5900f4e9910b76c4a0cb134833a8137f92404dfa"
    pullPolicy: IfNotPresent
  model:
    name: qwen3-vl-8b
    path: /models/qwen3-vl-8b
    hostPath: /var/home/alquimia/models
    apiKey: "change-me"
  service:
    type: ClusterIP
    port: 8000
  args:
    - "--model"
    - "/models/qwen3-vl-8b"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"
    - "--max-model-len"
    - "3000"
    - "--gpu-memory-utilization"
    - "0.90"
    - "--trust-remote-code"
  env:
    HF_HOME: /models/hf-cache
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
  resources:
    requests:
      cpu: "8"
      memory: "24Gi"
      nvidia.com/gpu: "1"
    limits:
      cpu: "12"
      memory: "32Gi"
      nvidia.com/gpu: "1"

nats:
  enabled: true
  config:
    cluster:
      enabled: false
    jetstream:
      enabled: false
  natsBox:
    enabled: false

web:
  enabled: true
  replicaCount: 1
  image:
    repository: alquimiaai/argos-web
    tag: web-v0.6.1-beta.0
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8080
    targetPort: 80
    nodePort: 31000
  externalHost: ""
  config:
    viteAppTimeZone: "America/Argentina/Buenos_Aires"
    viteBffUrl: ""
    mediamtxPublicHost: ""
    mediamtxWebrtcAllowOrigins: ""
    mediamtxWebrtcAdditionalHosts: ""
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 20
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

mediamtx:
  enabled: true
  createNamespace: true
  namespace: media
  replicaCount: 1
  image:
    repository: alquimiaai/mediamtx
    tag: v0.1.0
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
    existingClaim: ""
  auth:
    httpAddress: ""
    bffNamespace: ""
    path: /internal/media/auth
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  webrtc:
    allowOrigins: "*"
    additionalHosts: "*"
  extraEnv: {}
  service:
    type: NodePort
    ports:
      - name: rtsp
        port: 8554
        targetPort: 8554
        nodePort: 31554
        protocol: TCP
      - name: hls
        port: 18888
        targetPort: 18888
        nodePort: 31888
        protocol: TCP
      - name: webrtc
        port: 8889
        targetPort: 8889
        nodePort: 31889
        protocol: TCP
      - name: webrtc-udp
        port: 8189
        targetPort: 8189
        nodePort: 31189
        protocol: UDP
      - name: playback
        port: 9996
        targetPort: 9996
        nodePort: 31996
        protocol: TCP
      - name: api
        port: 9997
        targetPort: 9997
        nodePort: 31997
        protocol: TCP
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi