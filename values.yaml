global:
  storageClass: longhorn
  imagePullSecrets:
    - regcred

product:
  name: "Alquimia Slight"
  suite: "Alquimia Vision"
  targetPlatform: "appliance"
  os: "RHEL 10 AI"

serviceAccount:
  create: true
  name: ""

engine:
  enabled: true
  replicaCount: 1
  image:
    repository: alquimiaai/argos-engine
    tag: v0.10.3-beta.0
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  config:
    host: "0.0.0.0"
    port: "8000"
    logLevel: "debug"
    bffBaseUrl: ""
    natsUrl: ""
    frameBufferSize: "5"
    frameBatchSize: "1"
    storiesBufferSize: "5"
    storiesBatchSize: "2"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

bff:
  enabled: true
  replicaCount: 1
  image:
    repository: alquimiaai/argos-bff
    tag: bff-v0.14.0-beta.0
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  config:
    host: "0.0.0.0"
    port: "8000"
    authDisabled: "true"
    storageBucket: "argos-evidence"
  secret:
    jwtSecret: "change-me"
    bootstrapAdminUsername: "adminBff"
    bootstrapAdminPassword: "change-me"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  auth:
    database: bffdb
    username: bffUser
    password: change-me
  persistence:
    enabled: true
    size: 10Gi
    storageClass: ""
  service:
    port: 5432
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

minio:
  enabled: true
  image:
    repository: quay.io/minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  rootUser: "change-me"
  rootPassword: "change-me"
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
  service:
    apiPort: 9000
    consolePort: 9001
  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1Gi"

vlm:
  enabled: true
  replicaCount: 1
  runtimeClassName: nvidia
  image:
    repository: vllm/vllm-openai
    digest: "sha256:2296a2a7e1ce1dc59c6577ba5900f4e9910b76c4a0cb134833a8137f92404dfa"
    pullPolicy: IfNotPresent
  model:
    name: qwen3-vl-8b
    path: /models/qwen3-vl-8b
    hostPath: /var/home/alquimia/models
    apiKey: "change-me"
  service:
    type: ClusterIP
    port: 8000
  args:
    - "--model"
    - "/models/qwen3-vl-8b"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8000"
    - "--max-model-len"
    - "3000"
    - "--gpu-memory-utilization"
    - "0.90"
    - "--trust-remote-code"
  env:
    HF_HOME: /models/hf-cache
    HF_HUB_OFFLINE: "1"
    TRANSFORMERS_OFFLINE: "1"
  resources:
    requests:
      cpu: "8"
      memory: "24Gi"
      nvidia.com/gpu: "1"
    limits:
      cpu: "12"
      memory: "32Gi"
      nvidia.com/gpu: "1"

nats:
  enabled: true
  config:
    cluster:
      enabled: false
    jetstream:
      enabled: false
  natsBox:
    enabled: false

web:
  enabled: true
  replicaCount: 1
  image:
    repository: alquimiaai/argos-web
    tag: web-v0.6.1-beta.0
    pullPolicy: IfNotPresent
  service:
    type: NodePort
    port: 8080
    targetPort: 80
    nodePort: 31000
  config:
    viteAppTimeZone: "America/Argentina/Buenos_Aires"
    viteBffUrl: ""
    mediamtxPublicHost: ""
    mediamtxWebrtcAllowOrigins: ""
    mediamtxWebrtcAdditionalHosts: ""
  readinessProbe:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 20
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

mediamtx:
  enabled: true
  createNamespace: true
  namespace: media
  replicaCount: 1
  image:
    repository: alquimiaai/mediamtx
    tag: v0.1.0
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""
    existingClaim: ""
  auth:
    httpAddress: ""
    bffNamespace: ""
    path: /internal/media/auth
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  env:
    MTX_API: "yes"
    MTX_METRICS: "yes"
    MTX_PLAYBACK: "yes"
    MTX_HLSADDRESS: ":18888"
    MTX_LOGLEVEL: info
    MTX_LOGSTRUCTURED: "yes"
    MTX_RTSPTRANSPORTS: tcp
    MTX_AUTHMETHOD: http
    MTX_PLAYBACKADDRESS: ":9996"
    MTX_PATHDEFAULTS_RECORD: "yes"
    MTX_PATHDEFAULTS_RECORDPATH: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
    MTX_PATHDEFAULTS_RECORDFORMAT: fmp4
    MTX_PATHDEFAULTS_RECORDPARTDURATION: 1s
    MTX_PATHDEFAULTS_RECORDSEGMENTDURATION: 30s
    MTX_PATHDEFAULTS_RECORDDELETEAFTER: 30m
    MTX_WEBRTCALLOWORIGINS: "http://192.168.77.5:31000,http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8080,http://localhost:8080"
    MTX_WEBRTCADDITIONALHOSTS: "192.168.77.5,127.0.0.1,localhost"
  service:
    type: NodePort
    ports:
      - name: rtsp
        port: 8554
        targetPort: 8554
        nodePort: 31554
        protocol: TCP
      - name: hls
        port: 18888
        targetPort: 18888
        nodePort: 31888
        protocol: TCP
      - name: webrtc
        port: 8889
        targetPort: 8889
        nodePort: 31889
        protocol: TCP
      - name: webrtc-udp
        port: 8189
        targetPort: 8189
        nodePort: 31189
        protocol: UDP
      - name: playback
        port: 9996
        targetPort: 9996
        nodePort: 31996
        protocol: TCP
      - name: api
        port: 9997
        targetPort: 9997
        nodePort: 31997
        protocol: TCP
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi