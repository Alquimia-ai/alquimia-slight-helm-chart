name: Publish Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - "Chart.yaml"
      - "values*.yaml"
      - "templates/**"
      - ".github/workflows/publish-chart.yml"
      - "artifacthub-repo.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build chart dependencies
        run: helm dependency build .

      - name: Install chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Package chart
        run: cr package . --package-path .cr-release-packages

      - name: Upload chart package to GitHub Releases
        run: cr upload --skip-existing --owner "${{ github.repository_owner }}" --git-repo "${{ github.event.repository.name }}" --package-path .cr-release-packages
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Update Helm repository index on gh-pages
        run: cr index --skip-existing --owner "${{ github.repository_owner }}" --git-repo "${{ github.event.repository.name }}" --package-path .cr-release-packages --index-path . --push
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
