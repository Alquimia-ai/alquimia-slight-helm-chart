# Ubuntu-oriented profile: same stack as the default chart but without the VLM (vLLM) workload.
global:
  storageClass: longhorn

product:
  os: "Ubuntu 22.04 LTS"
  targetPlatform: "appliance"

vlm:
  enabled: false

postgres:
  persistence:
    enabled: true
    size: 10Gi
    storageClass: longhorn

minio:
  persistence:
    enabled: true
    size: 20Gi
    storageClass: longhorn
